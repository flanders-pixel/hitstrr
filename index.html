<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'unsafe-inline';">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HITSTER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#141414;color:#F0EFEA;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:540px;padding:20px 16px 80px;display:flex;flex-direction:column;gap:14px}
.hero{text-align:center;padding:24px 0 8px}
.ring{width:68px;height:68px;border-radius:50%;border:3px solid #FF6B35;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:32px}
h1{font-size:50px;font-weight:900;letter-spacing:.14em;color:#FF6B35}
.sub{font-size:11px;color:#555;letter-spacing:.18em;margin-top:6px}
.card{background:#1E1E1E;border-radius:14px;padding:18px 16px;display:flex;flex-direction:column;gap:12px}
.label{font-size:10px;font-weight:800;letter-spacing:.22em;color:#FF6B35;text-transform:uppercase}
.hint{font-size:12px;color:#444;font-style:italic}
.pl-btn{background:#2A2A2A;border:2px solid transparent;border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%;color:#F0EFEA;text-align:left}
.pl-btn.active{border-color:#FF6B35}
.pl-name{font-size:14px;font-weight:700;margin:0}
.pl-meta{font-size:11px;color:#666;margin:3px 0 0}
.pl-emoji{font-size:26px;flex-shrink:0}
.check{color:#FF6B35;font-weight:900;font-size:18px}
.row{display:flex;gap:8px}
.pill{background:#2A2A2A;color:#F0EFEA;border:none;border-radius:20px;padding:8px 18px;font-size:15px;font-weight:700;cursor:pointer}
.pill.active{background:#FF6B35;color:#fff}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input{background:#2A2A2A;border:none;border-radius:8px;padding:11px 12px;color:#F0EFEA;font-size:14px;outline:none;width:100%}
.start-btn{background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:18px 0;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.start-btn:disabled{background:#2A2A2A;color:#444;cursor:default}
.scoreboard{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.chip{background:#1E1E1E;border-radius:10px;padding:8px 14px;display:flex;flex-direction:column;align-items:center;min-width:68px;opacity:.4;flex-shrink:0}
.chip.active{opacity:1;border:2px solid #FF6B35}
.chip-name{font-size:10px;color:#aaa;font-weight:700;white-space:nowrap}
.chip-score{font-size:22px;font-weight:900;color:#FF6B35}
.turn-line{font-size:13px;color:#666;text-align:center}
.turn-name{color:#FF6B35;font-weight:bold}
.deck-wrap{display:flex;justify-content:center;padding:16px 0}
.deck-card{background:#1E1E1E;border:2px dashed #FF6B35;border-radius:16px;width:180px;height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:10px}
.deck-emoji{font-size:42px}
.deck-label{font-size:12px;color:#FF6B35;font-weight:800;letter-spacing:.12em}
.deck-sub{font-size:11px;color:#444}
.qr-card{background:#1E1E1E;border-radius:14px;padding:20px 16px;display:flex;flex-direction:column;gap:14px;align-items:center}
.qr-card p{font-size:13px;font-weight:700;margin:0;text-align:center}
.qr-sub{font-size:12px;color:#555;font-weight:400 !important}
.mystery-card{background:#1E1E1E;border-radius:14px;padding:16px;text-align:center;border:2px solid #2A2A2A;font-size:13px;color:#555}
.slot-btn{background:#2A2A2A;border:2px dashed #333;border-radius:8px;color:#555;padding:10px 12px;font-size:12px;font-weight:600;cursor:pointer;text-align:left;width:100%}
.tl-card{background:#2A2A2A;border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.tl-year{font-size:13px;font-weight:900;color:#FF6B35;min-width:38px}
.tl-title{font-size:13px;font-weight:700;margin:0}
.tl-artist{font-size:11px;color:#555;margin:0}
.tl-slots{display:flex;flex-direction:column;gap:4px}
.placed-marker{font-size:11px;color:#FF6B35;font-weight:700;text-align:center;padding:4px 0}
.result-card{border-radius:14px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.result-card.correct{border:2px solid #4ECDC4}
.result-card.wrong{border:2px solid #FF6B35}
.result-title{font-size:22px;font-weight:900}
.result-artist{font-size:14px;color:#888}
.result-year{display:inline-block;background:#FF6B35;color:#fff;font-weight:900;font-size:28px;border-radius:8px;padding:8px 24px;margin-top:4px}
.result-verdict{font-size:17px;font-weight:800;margin-top:6px}
.result-verdict.correct{color:#4ECDC4}
.result-verdict.wrong{color:#FF6B35}
.tl-correct{background:#1a3328 !important;border-left:3px solid #4ECDC4}
.reveal-btn{background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:16px 0;font-size:15px;font-weight:800;cursor:pointer;width:100%}
.next-ok{background:#4ECDC4;color:#141414;border:none;border-radius:12px;padding:16px 0;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.next-next{background:#2A2A2A;color:#F0EFEA;border:none;border-radius:12px;padding:16px 0;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.end-btn{background:transparent;color:#333;border:1px solid #2A2A2A;border-radius:10px;padding:10px 0;font-size:12px;cursor:pointer;width:100%}
.how-row{display:flex;gap:12px;align-items:flex-start}
.how-icon{font-size:20px;flex-shrink:0}
.how-text{font-size:13px;color:#aaa;line-height:1.5}
.header-row{display:flex;justify-content:space-between;align-items:center;padding-top:4px}
.header-pl{font-size:12px;color:#666}
.header-left{font-size:12px;color:#555}
.results-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #2A2A2A}
.results-medal{font-size:24px;width:36px}
.results-name{flex:1;font-size:17px;font-weight:700}
.results-pts{font-size:22px;font-weight:900;color:#FF6B35}
</style>
</head>

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  screen: 'home', // home | game | results
  selectedPlaylist: null,
  playerCount: 2,
  playerNames: ['Player 1','Player 2','Player 3','Player 4','Player 5'],
  // game state
  deck: [],
  card: null,
  turn: 0,
  phase: 'draw', // draw | place | reveal | result
  slot: null,
  result: null,
  scores: [],
  timelines: [],
  playlist: null,
};

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function e(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) for (const [k,v] of Object.entries(attrs)) {
    if (k==='className') el.className=v;
    else if (k==='onClick') el.addEventListener('click',v);
    else if (k==='style') Object.assign(el.style,v);
    else if (k==='value'&&tag==='input') el.value=v;
    else if (k==='onInput') el.addEventListener('input',v);
    else if (k==='disabled') { if(v) el.disabled=true; }
    else if (k==='placeholder') el.placeholder=v;
    else el.setAttribute(k,v);
  }
  for (const c of children.flat()) {
    if (c==null||c===false) continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}

function makeQR(spotifyId) {
  const data = QR_DATA[spotifyId];
  if (!data) return e('div',{style:{width:'260px',height:'260px',background:'#2A2A2A',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',color:'#555',fontSize:'12px'}},'No QR');
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',data.vb);
  svg.setAttribute('width','260');
  svg.setAttribute('height','260');
  svg.style.borderRadius='12px';
  svg.style.display='block';
  svg.style.background='#fff';
  svg.setAttribute('shape-rendering','crispEdges');
  const [,,,h]=data.vb.split(' ');
  const [,,,w2]=data.vb.split(' ');
  const bg=document.createElementNS(ns,'path');
  bg.setAttribute('fill','#ffffff');
  bg.setAttribute('d','M0 0h'+data.vb.split(' ')[2]+'v'+data.vb.split(' ')[3]+'H0z');
  const path=document.createElementNS(ns,'path');
  path.setAttribute('stroke','#000000');
  path.setAttribute('d',data.d);
  svg.appendChild(bg);
  svg.appendChild(path);
  return svg;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML='';
  if (state.screen==='home') app.appendChild(renderHome());
  else if (state.screen==='game') app.appendChild(renderGame());
  else app.appendChild(renderResults());
}

function renderHome() {
  const f = document.createDocumentFragment();

  // Hero
  f.appendChild(e('div',{className:'hero'},
    e('div',{className:'ring'},'🎵'),
    e('h1',{},'HITSTER'),
    e('p',{className:'sub'},'Scan. Listen. Place. Win.')
  ));

  // How it works
  f.appendChild(e('div',{className:'card'},
    e('p',{className:'label'},'HOW IT WORKS'),
    ...([['📱','This phone shows a QR code for each song'],['📲','Phone 2 scans it → Spotify plays the track'],['📍','Everyone listens, then places in their timeline'],['👁','Tap Reveal to see the answer']]).map(([icon,text])=>
      e('div',{className:'how-row'},e('span',{className:'how-icon'},icon),e('p',{className:'how-text'},text))
    )
  ));

  // Playlist picker
  const plCard = e('div',{className:'card'},
    e('p',{className:'label'},'PLAYLIST'),
    ...PLAYLISTS.map(pl=>{
      const btn=e('button',{
        className:'pl-btn'+(state.selectedPlaylist===pl.id?' active':''),
        onClick:()=>{state.selectedPlaylist=pl.id;render();}
      },
        e('span',{className:'pl-emoji'},pl.emoji),
        e('div',{style:{flex:'1'}},
          e('p',{className:'pl-name'},pl.name),
          e('p',{className:'pl-meta'},pl.tracks.length+' tracks')
        ),
        state.selectedPlaylist===pl.id ? e('span',{className:'check'},'✓') : null
      );
      return btn;
    }),
    e('p',{className:'hint'},'Share more Spotify links in chat to add playlists.')
  );
  f.appendChild(plCard);

  // Player count
  const playerCard = e('div',{className:'card'},
    e('p',{className:'label'},'PLAYERS'),
    e('div',{className:'row'},
      ...[2,3,4,5].map(n=>e('button',{
        className:'pill'+(state.playerCount===n?' active':''),
        onClick:()=>{state.playerCount=n;render();}
      },''+n))
    ),
    e('div',{className:'name-grid'},
      ...state.playerNames.slice(0,state.playerCount).map((name,i)=>
        e('input',{
          placeholder:'Player '+(i+1),
          value:name,
          onInput:(ev)=>{state.playerNames[i]=ev.target.value;}
        })
      )
    )
  );
  f.appendChild(playerCard);

  // Start button
  const startBtn = e('button',{
    className:'start-btn',
    disabled:!state.selectedPlaylist,
    onClick:()=>{
      const pl = PLAYLISTS.find(p=>p.id===state.selectedPlaylist);
      state.playlist = pl;
      state.deck = shuffle(pl.tracks);
      state.scores = state.playerNames.slice(0,state.playerCount).map(()=>0);
      state.timelines = state.playerNames.slice(0,state.playerCount).map(()=>[]);
      state.turn = 0;
      state.card = null;
      state.phase = 'draw';
      state.slot = null;
      state.result = null;
      state.screen = 'game';
      render();
    }
  },'START GAME');
  f.appendChild(startBtn);

  return e('div',{},f);
}

function renderGame() {
  const {deck,card,turn,phase,slot,result,scores,timelines,playlist,playerNames,playerCount} = state;
  const players = playerNames.slice(0,playerCount);
  const tl = timelines[turn];
  const f = document.createDocumentFragment();

  // Header
  f.appendChild(e('div',{className:'header-row'},
    e('span',{className:'header-pl'},playlist.emoji+' '+playlist.name),
    e('span',{className:'header-left'},deck.length+' left')
  ));

  // Scoreboard
  f.appendChild(e('div',{className:'scoreboard'},
    ...players.map((name,i)=>e('div',{className:'chip'+(i===turn?' active':'')},
      e('span',{className:'chip-name'},name),
      e('span',{className:'chip-score'},''+scores[i])
    ))
  ));

  f.appendChild(e('p',{className:'turn-line'},
    e('b',{className:'turn-name'},players[turn]),"'s turn"
  ));

  // DRAW phase
  if (phase==='draw') {
    f.appendChild(e('div',{className:'deck-wrap'},
      e('div',{className:'deck-card',onClick:()=>{
        if(!deck.length){state.screen='results';render();return;}
        const [next,...rest]=deck;
        state.card=next;state.deck=rest;state.phase='place';state.slot=null;state.result=null;render();
      }},
        e('span',{className:'deck-emoji'},'🎵'),
        e('p',{className:'deck-label'},'TAP TO DRAW'),
        e('p',{className:'deck-sub'},deck.length+' cards left')
      )
    ));
  }

  // PLACE phase
  if (phase==='place' && card) {
    f.appendChild(e('div',{className:'qr-card'},
      e('p',{},'📲 Phone 2: scan to play in Spotify'),
      makeQR(card.id),
      e('p',{className:'qr-sub'},"Others: don't look at Phone 2!")
    ));
    f.appendChild(e('div',{className:'mystery-card'},'🎵 Mystery Song — place it in your timeline below'));
    f.appendChild(renderTimeline(tl, phase, slot, card, players[turn]));
  }

  // REVEAL phase
  if (phase==='reveal' && card) {
    f.appendChild(e('div',{className:'mystery-card'},'Card placed — ready to reveal?'));
    f.appendChild(renderTimeline(tl, phase, slot, card, players[turn]));
    f.appendChild(e('button',{className:'reveal-btn',onClick:()=>{
      const next=[...tl]; next.splice(slot,0,card);
      const ok=next.every((t,i)=>i===0||next[i-1].year<=t.year);
      const tls=[...timelines]; const sc=[...scores];
      if(ok){tls[turn]=next;sc[turn]++;}
      state.timelines=tls; state.scores=sc; state.result=ok?'correct':'wrong'; state.phase='result'; render();
    }},'👁 REVEAL SONG & YEAR'));
  }

  // RESULT phase
  if (phase==='result' && card) {
    const rc = e('div',{className:'result-card '+(result||'')},
      e('p',{className:'result-title'},card.title),
      e('p',{className:'result-artist'},card.artist),
      e('span',{className:'result-year'},''+card.year),
      e('p',{className:'result-verdict '+(result||'')},result==='correct'?'✓ Correct! +1 point':'✗ Wrong — card discarded')
    );
    f.appendChild(rc);
    // Show updated timeline
    const updatedTl = timelines[turn];
    const tlDiv = e('div',{className:'card'},
      e('p',{className:'label'},players[turn]+"'s Timeline"),
      e('div',{className:'tl-slots'},
        updatedTl.length===0
          ? e('p',{style:{fontSize:'12px',color:'#555',textAlign:'center'}},'No cards yet')
          : updatedTl.map(t=>{
              const isNew = t.title===card.title && result==='correct';
              const d=e('div',{className:'tl-card'+(isNew?' tl-correct':'')},
                e('span',{className:'tl-year'},''+t.year),
                e('div',{},e('p',{className:'tl-title'},t.title),e('p',{className:'tl-artist'},t.artist))
              );
              return d;
            })
      )
    );
    f.appendChild(tlDiv);
    // Next button
    const nextBtn = e('button',{
      className: result==='correct'?'next-ok':'next-next',
      onClick:()=>{
        if(!deck.length){state.screen='results';render();return;}
        state.card=null;state.slot=null;state.result=null;state.phase='draw';
        state.turn=(turn+1)%players.length; render();
      }
    }, deck.length===0?'SEE RESULTS':'NEXT PLAYER →');
    f.appendChild(nextBtn);
  }

  f.appendChild(e('button',{className:'end-btn',onClick:()=>{state.screen='results';render();}},'End Game'));

  return e('div',{},f);
}

function renderTimeline(tl, phase, slot, card, playerName) {
  const slots = [];
  if (tl.length===0 && phase==='place') {
    slots.push(e('button',{className:'slot-btn',onClick:()=>{state.slot=0;state.phase='reveal';render();}},
      '+ Place as first card'
    ));
  }
  for (let si=0; si<=tl.length; si++) {
    const before=tl[si-1], after=tl[si];
    if (phase==='place' && tl.length>0) {
      let label = si===0?'Before '+after?.year : si===tl.length?'After '+before?.year : 'Between '+before?.year+' — '+after?.year;
      slots.push(e('button',{className:'slot-btn',onClick:(()=>{const s=si;return()=>{state.slot=s;state.phase='reveal';render();}})();},label));
    }
    if (phase==='reveal' && si===slot) {
      slots.push(e('div',{className:'placed-marker'},'▼ placed here'));
    }
    if (after) {
      slots.push(e('div',{className:'tl-card'},
        e('span',{className:'tl-year'},''+after.year),
        e('div',{},e('p',{className:'tl-title'},after.title),e('p',{className:'tl-artist'},after.artist))
      ));
    }
  }
  return e('div',{className:'card'},
    e('p',{className:'label'},playerName+"'s Timeline"),
    e('div',{className:'tl-slots'},...slots)
  );
}

function renderResults() {
  const players = state.playerNames.slice(0,state.playerCount);
  const ranked = players.map((n,i)=>({n,s:state.scores[i]})).sort((a,b)=>b.s-a.s);
  const medals=['🥇','🥈','🥉'];
  const f = document.createDocumentFragment();
  f.appendChild(e('div',{className:'hero'},
    e('div',{className:'ring'},'🏆'),
    e('h1',{},'RESULTS')
  ));
  f.appendChild(e('div',{className:'card'},
    ...ranked.map((p,i)=>e('div',{className:'results-row'},
      e('span',{className:'results-medal'},medals[i]||(i+1+'.') ),
      e('span',{className:'results-name'},p.n),
      e('span',{className:'results-pts'},p.s+' pts')
    ))
  ));
  f.appendChild(e('button',{className:'start-btn',onClick:()=>{state.screen='home';render();}},'PLAY AGAIN'));
  return e('div',{},f);
}

window.addEventListener('DOMContentLoaded', function() {
  try { render(); }
  catch(err) {
    document.getElementById('app').innerHTML =
      '<div style="padding:20px;color:#ff6b35;font-family:monospace;white-space:pre-wrap">ERROR:\n'+err.message+'\n\n'+err.stack+'</div>';
  }
});
</script>
